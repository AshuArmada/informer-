services:
  db:
    image: postgres:16
    container_name: informer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: informer
      POSTGRES_PASSWORD: informer
      POSTGRES_DB: informer
    ports:
      # Host port 5433 (not 5432) to avoid colliding with any native Postgres install.
      - "5433:5432"
    volumes:
      - informer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U informer -d informer"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: informer-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  informer-db-data:
